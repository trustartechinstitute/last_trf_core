<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Display Grid</title>
    <style>
        body{
            background-color: #f0f0f0;
        }
        .ayos{
            height: 100px;
            background-color: #3498db;
            margin: 10px;
        }
        .humans{
            display: grid;
            grid-template-columns: 25% 25% 50%;

        }

        
    </style>
</head>
<body>
    <section class="humans">
        <div class="ayos">Ayo 1</div>
        <div class="ayos">Ayo 2</div>
        <div class="ayos">Ayo 3</div>
        <div class="ayos">Ayo 4</div>
        <div class="ayos">Ayo 5</div>
        <div class="ayos">Ayo 6</div>
    </section>
</body>
</html>
